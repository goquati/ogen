openapi: 3.0.4
info:
  title: ogen test
  version: 1.0.0

paths:
  /api/orders:
    get:
      tags:
        - orders
      operationId: getOrders
      responses:
        '200':
          description: "ok"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

components:
  schemas:
    Order:
      type: object
      required:
        - id
        - name
      properties:
        id:
          $ref: '../common.yaml#/components/schemas/OrderId'
        name:
          type: string
          nullable: true
